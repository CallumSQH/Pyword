# =============================================================================
# Demo 2 - Chapter 1
# =============================================================================

sections:
- type: "一级标题"
  text: "1. 绪论"
  content_paragraphs:
  - text: "本章说明第二套 demo 的目标：它不是再给一个孤立的内容样例，而是把“如何组织长文档”本身写成指导说明{{李明, 周宁. 结构化写作模板设计研究[J]. 数字出版, 2025, 18(2): 21-28}}。"
    style: "正文"
  - text: "当文档从几页变成几十页时，继续把所有内容塞进一个 YAML 文件，维护成本会快速上升。拆章节后，配置、正文、图片和表格就能按职责各自演进。"
    style: "正文"

- type: "二级标题"
  text: "1.1 为什么需要拆章节"
  content_paragraphs:
  - text: "拆章节最直接的价值，是让写作者只处理自己正在修改的部分。绪论、方法、实验、结论可以分别维护，不会因为一次小改动而在大文件中来回滚动。"
    style: "正文"
  - text: "对协作场景来说，这种组织方式也更稳定。不同成员可以认领不同章节，最后由总配置统一装配，避免格式策略和正文表达混在一起。"
    style: "正文"

- type: "二级标题"
  text: "1.2 本示例适合什么场景"
  content_paragraphs:
  - text: "如果你的目标是论文、项目申请书、研究报告、课程设计说明书，或者任何天然带有章节层级的文档，这套写法会更顺手。"
    style: "正文"
  - text: "如果只是两三页的简短说明，继续使用第一套 demo 的单文件内容方式即可，不必为了结构而结构。"
    style: "正文"
