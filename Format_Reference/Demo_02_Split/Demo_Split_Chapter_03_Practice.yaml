# =============================================================================
# Demo 2 - Chapter 3
# =============================================================================

sections:
- type: "一级标题"
  text: "3. 章节编写实践"
  content_paragraphs:
  - text: "本章用接近论文正文的写法展示：每个章节文件都可以独立编写、独立审阅，最后再统一出稿{{陈晓, 郑川. 多源文档装配机制研究[J]. 信息工程大学学报, 2025, 9(4): 55-63}}。"
    style: "正文"

- type: "二级标题"
  text: "3.1 一个章节文件最少需要什么"
  content_paragraphs:
  - text: "最少只需要 sections 根节点。其下按顺序放一级标题、二级标题、正文、图片、表格即可。这样每个章节天然就是一个可复用的内容块。"
    style: "正文"
  - text: "如果某一章暂时还没写完，也可以先保留标题和几段提纲说明，保证总装配时文档结构完整。"
    style: "正文"

- type: "二级标题"
  text: "3.2 如何处理图片与表格"
  content_paragraphs:
  - text: "建议把图片和表格就近放在所属章节，而不是集中堆到文末。读者阅读论文时，本来就希望图表跟随上下文出现。"
    style: "正文"
  - text: "如果一个章节中需要多张图并排展示，直接在该章节文件里写一个 type 为 图片 的 section 即可，不需要额外改主程序。"
    style: "正文"

- type: "图片"
  paths: [ "../Example_Image/2.jpg", "../Example_Image/3.jpg" ]
  captions: [ "章节内局部插图示例", "多图并排示例" ]

- type: "二级标题"
  text: "3.3 如何写成真正的指导说明"
  content_paragraphs:
  - text: "好的 demo 不只是展示能跑，更要告诉后来者为什么这样组织、什么时候该这样组织、以及如果要扩展下一步应该改哪里。"
    style: "正文"
  - text: "例如，你可以在段落中直接提示：当文档超过 5 章时，每章一个 YAML；当多人协作时，按章节认领；当样式要统一调整时，只改总配置或被复用的基础配置。"
    style: "正文"
  - text: "格式说明也可以保留在正文里，例如 H<sub>2</sub>O、SO<sub>4</sub><sup>2-</sup>、E=mc<sup>2</sup> 这样的上下标测试仍然能工作，说明拆章节不会影响文本标记能力。"
    style: "正文"
