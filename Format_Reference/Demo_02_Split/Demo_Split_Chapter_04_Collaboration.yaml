# =============================================================================
# Demo 2 - Chapter 4
# =============================================================================

sections:
- type: "一级标题"
  text: "4. 协作、复用与维护建议"
  content_paragraphs:
  - text: "本章给出把拆分式 demo 真正用于项目时的维护建议。重点是让模板长期可用，而不是一次性把文件堆出来就结束。"
    style: "正文"

- type: "二级标题"
  text: "4.1 推荐的协作规则"
  content_paragraphs:
  - text: "第一，样式集中维护。页面设置、标题字号、图题表题等全局规则放在总配置或基础配置，不要复制到每个章节文件里。"
    style: "正文"
  - text: "第二，章节各自负责内容。章节文件只写这一章真正要说的话，避免把全局变量、全局说明反复写进每一章。"
    style: "正文"
  - text: "第三，资源路径保持相对路径。这样项目整体移动目录后，图片和表格仍然容易追踪。"
    style: "正文"

- type: "二级标题"
  text: "4.2 推荐的发布检查清单"
  content_paragraphs:
  - text: "在生成最终稿前，至少检查四件事：章节顺序是否正确、图片路径是否有效、表格标题是否完整、引用是否按预期自动编号{{王凯, 许然. 可维护文档工程实践[J]. 软件工程, 2025, 28(7): 77-84}}。"
    style: "正文"
  - text: "如果你把 demo 当作团队模板，建议每次修改后都重新生成一次 docx 和 pdf，确保不是只有 YAML 看起来对，实际排版却已经偏掉。"
    style: "正文"

- type: "表格"
  table_name: "发布前检查表"
  headers: [ "检查项", "推荐动作", "通过标准" ]
  data_rows:
  - [ "章节顺序", "核对 chapter_configs", "目录与正文顺序一致" ]
  - [ "资源引用", "检查图片路径", "所有图片均成功显示" ]
  - [ "引用编号", "通读含引用段落", "正文与参考文献编号对应" ]
  - [ "输出文件", "确认 output_filename", "不会覆盖错误版本产物" ]
  caption: "拆分式文档发布建议"
  style: "居中"

- type: "一级标题"
  text: "5. 结论"
  content_paragraphs:
  - text: "第二套 demo 的核心价值，是把“如何拆分文档”这件事直接做成可运行示例。第一套 demo 适合快速上手，第二套 demo 适合真实项目逐章扩展。"
    style: "正文"
  - text: "如果后续你要继续扩展，只需要新增章节 YAML，再把文件名追加到 chapter_configs 中即可。模板引擎本身不需要为了章节增减而反复改代码。"
    style: "正文"
