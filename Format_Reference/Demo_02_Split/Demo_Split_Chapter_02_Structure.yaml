# =============================================================================
# Demo 2 - Chapter 2
# =============================================================================

sections:
- type: "一级标题"
  text: "2. 文件组织与职责划分"
  content_paragraphs:
  - text: "本章把拆分式 demo 的推荐目录结构讲清楚，重点不是文件越多越好，而是每个文件都只负责一件事。"
    style: "正文"

- type: "二级标题"
  text: "2.1 总配置负责什么"
  content_paragraphs:
  - text: "总配置文件负责全局信息，例如标题、作者、页面参数、统一样式，以及章节装配顺序。它更像目录索引，而不是正文容器。"
    style: "正文"
  - text: "在本 demo 中，Demo_02_Split/Demo_Split_Config.yaml 通过 import_base_config 复用第一套 demo 的样式，再通过 chapter_configs 挂载多个章节文件，形成一个完整文档。"
    style: "正文"

- type: "表格"
  table_name: "拆分式文件职责表"
  headers: [ "文件类型", "主要职责", "建议放入的内容" ]
  data_rows:
  - [ "总配置", "统一入口", "标题、作者、样式、输出文件名、章节顺序" ]
  - [ "章节文件", "正文表达", "每章标题、段落、局部图片、局部表格" ]
  - [ "图片目录", "资源托管", "截图、示意图、实验图" ]
  - [ "附录文件", "独立补充", "术语表、附录、补充材料" ]
  caption: "拆分式组织建议"
  style: "居中"

- type: "二级标题"
  text: "2.2 章节文件应该怎么命名"
  content_paragraphs:
  - text: "建议使用可排序的前缀，例如 00、01、02。这样在 chapter_configs 里和文件夹中都更容易看懂装配顺序。"
    style: "正文"
  - text: "如果文档后期会继续增长，可以预留编号间隔，例如 10、20、30，给中间插章留下余地。"
    style: "正文"

- type: "图片"
  paths: [ "../Example_Image/1.jpg" ]
  captions: [ "拆分式写作的资源引用示意" ]
