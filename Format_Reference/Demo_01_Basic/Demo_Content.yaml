# =============================================================================
# Word 文档模板生成器 - 正文内容文件
# 版本: 2.0
# 创建日期: 2025-01-05
# =============================================================================
# 使用说明：
# 1. 本文件仅包含 sections 内容部分
# 2. 可独立编辑，便于内容与配置分离管理
# 3. 使用时将本文件路径填入 Demo_Config.yaml 的 chapter_configs 字段

# =============================================================================
# 文档内容章节
# =============================================================================
sections:

# ==========================================================================
# 全文大标题
# ==========================================================================
- type: "全文大标题"
  text: "基于人工智能的图像识别研究"

- type: "正文"
  text: "张三 某某大学计算机学院"
  content_paragraphs: []
  alignment: "center"

# ==========================================================================
# 第一章：绪论
# ==========================================================================
- type: "一级标题"
  text: "1. 绪论"
  content_paragraphs:
  - text: "本章主要介绍研究背景、研究意义以及论文的组织结构{{张三, 李四. 文档模板自动化生成技术研究[J]. 计算机应用与软件, 2023, 40(6): 123-128}}。"
    style: "正文"
  - text: "随着办公自动化需求的不断增长，文档模板的标准化和自动化生成变得越来越重要。"
    style: "正文"

- type: "二级标题"
  text: "1.1 研究背景"
  content_paragraphs:
  - text: "在学术论文和技术文档的编写过程中，格式规范化是一项耗时且容易出错的工作{{王明, 赵华. 轻量级文档模板引擎设计与实现[J]. 软件导刊, 2024, 23(2): 45-49}}。"
    style: "正文"
  - text: "传统的 Word 文档编写方式存在以下问题："
    style: "正文"
  - text: "• 格式不一致：多人协作时难以保证格式统一"
    style: "正文"
  - text: "• 重复劳动：相同的格式设置需要反复操作"
    style: "正文"
  - text: "• 维护困难：修改整体格式需要逐一调整每个段落"
    style: "正文"

- type: "二级标题"
  text: "1.2 研究意义"
  content_paragraphs:
  - text: "本研究旨在解决上述问题，通过 YAML 配置文件实现文档的自动化生成{{刘洋, 陈伟. 基于模板的文档自动生成方法研究[J]. 计算机工程与应用, 2024, 60(3): 78-85}}。"
    style: "正文"
  - text: "主要研究意义包括："
    style: "正文"
  - text: "1. 提高文档编写效率，减少重复劳动"
    style: "正文"
  - text: "2. 保证文档格式的一致性和规范性"
    style: "正文"
  - text: "3. 便于文档的维护和更新"
    style: "正文"

- type: "三级标题"
  text: "1.2.1 理论意义"
  content_paragraphs:
  - text: "从理论角度，本研究探索了配置文件驱动的文档生成模式{{孙志强, 周敏. 文档自动化处理技术综述[J]. 中文信息学报, 2023, 37(4): 1-15}}。"
    style: "正文"
  - text: "为文档模板的标准化提供了新的思路和方法。"
    style: "正文"

- type: "三级标题"
  text: "1.2.2 实际意义"
  content_paragraphs:
  - text: "从实际应用角度，本系统可以广泛应用于："
    style: "正文"
  - text: "• 学术论文撰写"
    style: "正文"
  - text: "• 技术报告生成"
    style: "正文"
  - text: "• 规范文档编制"
    style: "正文"

# ==========================================================================
# 第二章：系统设计
# ==========================================================================
- type: "一级标题"
  text: "2. 系统设计与实现"
  content_paragraphs:
  - text: "本章详细介绍系统的整体架构设计和核心功能实现{{马涛, 徐敏. 文档生成系统的架构设计[J]. 软件学报, 2024, 35(3): 234-248}}。"
    style: "正文"

- type: "二级标题"
  text: "2.1 系统架构"
  content_paragraphs:
  - text: "系统采用模块化设计，主要包括以下模块："
    style: "正文"

- type: "三级标题"
  text: "2.1.1 单张图片展示"
  content_paragraphs:
  - text: "图 2.1 展示了系统的整体架构设计。"
    style: "正文"

- type: "图片"
  paths: [ "../Example_Image/1.jpg" ]
  captions: [ "系统整体架构图" ]

- type: "三级标题"
  text: "2.1.2 多图片并排展示"
  content_paragraphs:
  - text: "图 2.2 展示了多张图片的并排显示效果。"
    style: "正文"

- type: "图片"
  paths: [ "../Example_Image/2.jpg", "../Example_Image/3.jpg" ]
  captions: [ "用户界面", "配置界面" ]

- type: "三级标题"
  text: "2.1.3 四图片网格布局"
  content_paragraphs:
  - text: "图 2.3 展示了四张图片的两行两列布局。"
    style: "正文"

- type: "图片"
  paths: [ "../Example_Image/1.jpg", "../Example_Image/2.jpg", "../Example_Image/3.jpg", "../Example_Image/4.jpg" ]
  captions: [ "功能模块1", "功能模块2", "功能模块3", "功能模块4" ]

# ==========================================================================
# 第三章：实验结果
# ==========================================================================
- type: "一级标题"
  text: "3. 实验与结果分析"
  content_paragraphs:
  - text: "本章通过实验验证系统的性能和效果{{曾强, 彭娟. 文档生成系统性能评估研究[J]. 计算机应用研究, 2024, 41(5): 1567-1572}}。"
    style: "正文"

- type: "表格"
  table_name: "实验参数表"
  headers: [ "参数名称", "参数值", "说明" ]
  data_rows:
  - [ "测试文档数量", "100", "随机生成的测试文档" ]
  - [ "平均段落数", "50", "每篇文档的段落数量" ]
  - [ "平均图片数", "5", "每篇文档的图片数量" ]
  - [ "平均表格数", "3", "每篇文档的表格数量" ]
  - [ "重复测试次数", "5", "用于计算平均值" ]
  caption: "实验参数设置表"
  style: "居中"

- type: "表格"
  table_name: "性能测试结果表"
  headers: [ "配置方案", "平均生成时间(s)", "成功率(%)", "格式准确率(%)" ]
  data_rows:
  - [ "基础配置", "2.3", "100", "98.5" ]
  - [ "标准配置", "3.1", "100", "99.2" ]
  - [ "完整配置", "4.5", "100", "99.8" ]
  - [ "批量生成", "180.2", "100", "99.5" ]
  caption: "性能测试结果表"
  style: "居中"

# ==========================================================================
# 第四章：总结
# ==========================================================================
- type: "一级标题"
  text: "4. 总结与展望"
  content_paragraphs:
  - text: "本章对全文工作进行总结，并展望未来的研究方向{{唐伟, 董芳. 文档自动化技术的现状与展望[J]. 现代图书情报技术, 2024, 40(1): 1-12}}。"
    style: "正文"

- type: "二级标题"
  text: "4.1 格式测试用例"
  content_paragraphs:
  - text: "本节用于测试上下标功能和斜体功能，验证 <sub>、<sup> 和 <i> 标签的正确实现。"
    style: "正文"
  - text: "化学式示例：水分子 H<sub>2</sub>O，二氧化碳 CO<sub>2</sub>，硫酸根离子 SO<sub>4</sub><sup>2-</sup>。"
    style: "正文"
  - text: "离子符号示例：氢离子 H<sup>+</sup>，氢氧根离子 OH<sup>-</sup>，钙离子 Ca<sup>2+</sup>。"
    style: "正文"
  - text: "数学公式示例：质能方程 E=mc<sup>2</sup>，勾股定理 a<sup>2</sup>+b<sup>2</sup>=c<sup>2</sup>。"
    style: "正文"
  - text: "复合示例：碳酸氢钠 NaHCO<sub>3</sub> 是常见的食品添加剂[1]，磷酸 H<sub>3</sub>PO<sub>4</sub> 在生物化学中很重要[2]。"
    style: "正文"
  - text: "更多化学式：葡萄糖 C<sub>6</sub>H<sub>12</sub>O<sub>6</sub>，乙醇 C<sub>2</sub>H<sub>5</sub>OH，甲烷 CH<sub>4</sub>[3]。"
    style: "正文"
  - text: "斜体测试：<i>这是一段斜体文本</i>，用于测试斜体功能的实现。"
    style: "正文"
  - text: "混合格式测试：<i>斜体</i> 与 <sub>下标</sub> 和 <sup>上标</sup> 的组合使用[4]。"
    style: "正文"
  - text: "学术示例：<i>in vitro</i> 研究和 <i>in vivo</i> 实验结果表明该方法有效[5]。"
    style: "正文"

- type: "二级标题"
  text: "4.2 工作总结"
  content_paragraphs:
  - text: "本文主要工作总结如下："
    style: "正文"
  - text: "1. 设计并实现了基于 YAML 配置的 Word 文档生成系统"
    style: "正文"
  - text: "2. 支持多种文档元素的自动化生成"
    style: "正文"
  - text: "3. 实现了参考文献的自动编号和格式化"
    style: "正文"
  - text: "4. 支持自定义页面设置和样式配置"
    style: "正文"

- type: "二级标题"
  text: "4.3 研究展望"
  content_paragraphs:
  - text: "未来的研究方向包括："
    style: "正文"
  - text: "1. 支持更多文档格式（PDF、HTML 等）"
    style: "正文"
  - text: "2. 提供可视化配置界面"
    style: "正文"
  - text: "3. 支持多人协作编辑"
    style: "正文"
  - text: "4. 集成 AI 辅助写作功能"
    style: "正文"
